<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Week 3 Slides | Stones &amp; Anchors</title>
  <link rel="stylesheet" href="../assets/css/theme.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <style>
    .slide-viewer-shell {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; width: 100%;
    }
    .viewer-cluster {
      display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
      width: min(98vw, calc((100dvh - var(--slide-chrome)) * 16 / 9));
      max-width: 100%; overflow: hidden;
    }
    .viewer-frame-wrap {
      position: relative; background: var(--stone);
      border: 1px solid rgba(139, 111, 71, 0.3);
      width: 100%; aspect-ratio: 16 / 9;
      max-height: calc(100dvh - var(--slide-chrome));
    }
    .viewer-frame { width: 100%; height: 100%; border: 0; background: var(--stone); display: block; }
    .viewer-controls-only {
      display: flex; gap: 0.65rem; flex-shrink: 0; padding: 0.15rem 0 0.25rem;
    }
    .viewer-btn {
      appearance: none; border: 1px solid rgba(139, 111, 71, 0.35);
      background: var(--stone); color: var(--cream); padding: 0.6rem 1.1rem;
      font-family: 'Palatino Linotype', Palatino, serif; font-size: 0.58rem;
      letter-spacing: 0.16em; text-transform: uppercase; cursor: pointer;
    }
    .viewer-btn:hover, .viewer-btn:focus-visible { border-color: var(--rope); color: var(--sand); outline: none; }
    .viewer-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  </style>
</head>
<body class="page-inner page-slide-viewer">
  <header class="site-header">
    <div class="site-header-inner">
      <a class="site-logo" href="../index.html">Stones <span class="amp">&amp;</span> Anchors</a>
      <nav class="site-nav" aria-label="Main">
        <a href="week-03.html" class="slide-viewer-back">Week 3</a>
        <a href="../index.html">Home</a>
        <a href="../schedule.html">Schedule</a>
        <a href="index.html">Resources</a>
      </nav>
    </div>
  </header>

  <main class="site-main-inner slide-viewer-main">
    <section class="slide-viewer-shell" aria-label="Week 3 slide viewer">
      <div class="viewer-cluster">
        <div class="viewer-frame-wrap">
          <iframe id="slide-frame" class="viewer-frame" title="Week 3 slide content" scrolling="no"></iframe>
        </div>
        <div class="viewer-controls-only" aria-label="Slide navigation controls">
          <button id="prev-slide" class="viewer-btn" type="button">Previous</button>
          <button id="next-slide" class="viewer-btn" type="button">Next</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const slides = [
      { id: 'cover',          title: 'Week 3 · Sacrifice' },
      { id: 'good_samaritan', title: 'The Disciple & The Leader — Luke 10' },
      { id: 'husband_father', title: 'The Husband & Father — Ephesians 5' },
      { id: 'the_ransom',     title: 'The Ransom — The Root of Sacrifice' }
    ];

    const frame   = document.getElementById('slide-frame');
    const prevBtn = document.getElementById('prev-slide');
    const nextBtn = document.getElementById('next-slide');
    let currentIndex = 0;

    function renderViewer() {
      const slide = slides[currentIndex];
      frame.src = `../week3_slides/${slide.id}.html`;
      frame.setAttribute('title', slide.title);
      prevBtn.disabled = currentIndex === 0;
      nextBtn.disabled = currentIndex === slides.length - 1;
    }

    prevBtn.addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; renderViewer(); } });
    nextBtn.addEventListener('click', () => { if (currentIndex < slides.length - 1) { currentIndex++; renderViewer(); } });
    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft'  && currentIndex > 0)                 { currentIndex--; renderViewer(); }
      if (e.key === 'ArrowRight' && currentIndex < slides.length - 1) { currentIndex++; renderViewer(); }
    });

    renderViewer();
  </script>
</body>
</html>
