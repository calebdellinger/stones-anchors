<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Week 2 · Obedience</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #2c2a26; font-family: Georgia, 'Times New Roman', serif; }
    .slide-container {
      width: 1280px;
      min-height: 720px;
      background: #2c2a26;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .panel {
      width: 1120px;
      min-height: 600px;
      background: #f5f0e8;
      border: 1px solid rgba(139,111,71,0.38);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    .panel::before, .panel::after, .corner-br, .corner-bl {
      content: "";
      position: absolute;
      width: 26px;
      height: 26px;
      border-color: #8b6f47;
      border-style: solid;
    }
    .panel::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .panel::after  { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
    .corner-br { right: -1px; bottom: -1px; border-width: 0 2px 2px 0; }
    .corner-bl { left: -1px;  bottom: -1px; border-width: 0 0 2px 2px; }

    .eyebrow {
      font-family: 'Palatino Linotype', Palatino, Georgia, serif;
      text-transform: uppercase;
      letter-spacing: 0.34em;
      font-size: 14px;
      color: #4a6741;
    }
    .week {
      font-family: 'Palatino Linotype', Palatino, Georgia, serif;
      color: #8b6f47;
      font-size: 24px;
      letter-spacing: 0.12em;
    }
    h1 {
      width: 860px;
      text-align: center;
      font-family: 'Palatino Linotype', Palatino, Georgia, serif;
      font-size: 72px;
      line-height: 1.05;
      color: #2c2a26;
      font-weight: 700;
    }
    .divider {
      width: 430px;
      display: flex;
      align-items: center;
      gap: 18px;
      margin-top: 2px;
      margin-bottom: 2px;
    }
    .divider .line { flex: 1; height: 1px; background: rgba(139,111,71,0.55); }
    .divider .dot  { width: 10px; height: 10px; border-radius: 50%; background: #8b6f47; }

    .anchor-verse {
      width: 680px;
      text-align: center;
      font-size: 22px;
      line-height: 1.52;
      color: #3d3a34;
      font-style: italic;
    }
    .anchor-ref {
      display: block;
      margin-top: 8px;
      font-style: normal;
      font-family: 'Palatino Linotype', Palatino, Georgia, serif;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      font-size: 13px;
      color: #8b6f47;
    }
    .subtitle {
      width: 680px;
      text-align: center;
      color: #3d3a34;
      font-size: 21px;
      line-height: 1.45;
    }
    .footer-note {
      position: absolute;
      bottom: 30px;
      font-family: 'Palatino Linotype', Palatino, Georgia, serif;
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #6b645a;
    }
  </style>
  <link rel="stylesheet" href="slide-fit.css" />
</head>
<body>
  <div class="slide-container">
    <div class="panel">
      <div class="corner-br"></div>
      <div class="corner-bl"></div>
      <div class="eyebrow">Stones &amp; Anchors Men's Bible Study</div>
      <div class="week">Week 2</div>
      <h1>Obedience</h1>
      <div class="divider">
        <div class="line"></div>
        <div class="dot"></div>
        <div class="line"></div>
      </div>
      <div class="anchor-verse">
        "The only proof of true faith is obedience."
        <span class="anchor-ref">— Andrew Murray</span>
      </div>
      <div class="subtitle">Anchored in Genesis 22 — The story of Abraham and Isaac</div>
      <div class="footer-note">Stones &amp; Anchors · Week 2</div>
    </div>
  </div>
<script src="../assets/js/slide-scale.js"></script>
</body>
</html>
